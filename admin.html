<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login | Arpith Thomas</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0f1e;
      color: #e0e0e0;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-box {
      background: #0d1b2a;
      border: 1px solid #00ff9d33;
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 0 30px #00ff9d22;
    }

    .login-box h1 {
      color: #00ff9d;
      font-size: 1.5rem;
      margin-bottom: 8px;
      text-align: center;
    }

    .login-box p {
      color: #888;
      font-size: 0.85rem;
      text-align: center;
      margin-bottom: 30px;
    }

    label {
      display: block;
      font-size: 0.85rem;
      color: #aaa;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 12px 16px;
      background: #0a0f1e;
      border: 1px solid #00ff9d44;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 0.95rem;
      margin-bottom: 20px;
      outline: none;
      transition: border 0.3s;
    }

    input:focus {
      border-color: #00ff9d;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #00ff9d;
      color: #0a0f1e;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background: #00cc7a;
    }

    .error {
      color: #ff4d4d;
      font-size: 0.85rem;
      text-align: center;
      margin-top: 12px;
      display: none;
    }

    .terminal-tag {
      text-align: center;
      margin-bottom: 20px;
      color: #00ff9d;
      font-size: 0.8rem;
      letter-spacing: 2px;
    }
  </style>
<script nonce="xiz80iJfJTd8OSB1" type="text/javascript" src="//self.adblockultimate.net/manager.js?tm=1774180377&amp;lg=true" guid="{EE7A232E-1DA0-4A8F-BCAD-3C922AD565AF}" inwhitelist="false" status="true" autohide="true"></script></head>
<body>

  <div class="login-box">
    <div class="terminal-tag">[ ADMIN ACCESS ]</div>
    <h1>🔒 Admin Panel</h1>
    <p>Arpith Thomas Portfolio</p>

    <label>Username</label>
    <input type="text" id="username" placeholder="Enter username" />

    <label>Password</label>
    <input type="password" id="password" placeholder="Enter password" />

    <button onclick="login()">Login</button>

    <div class="error" id="errorMsg">❌ Invalid username or password</div>
  </div>

  <script>
    async function login() {
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');

      errorMsg.style.display = 'none';

      try {
        const response = await fetch('https://portfolio-backend-0uic.onrender.com/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (data.success) {
          localStorage.setItem('adminToken', data.token);
          window.location.href = 'dashboard.html';
        } else {
          errorMsg.style.display = 'block';
        }
      } catch (error) {
        errorMsg.textContent = '❌ Cannot connect to server. Try again.';
        errorMsg.style.display = 'block';
      }
    }

    // Allow Enter key to login
    document.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') login();
    });
  </script>

</body>
</html>
